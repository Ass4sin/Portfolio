<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tudor Petre — Cybersécurité</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808;
    --bg2: #0e0e0e;
    --bg3: #141414;
    --green: #00FF41;
    --green-dim: #00cc33;
    --green-glow: rgba(0,255,65,0.15);
    --green-faint: rgba(0,255,65,0.06);
    --text: #d4d4d4;
    --text-dim: #666;
    --text-muted: #444;
    --border: #1e1e1e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow-x: hidden;
    line-height: 1.6;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  #root { min-height: 100vh; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--green);
    letter-spacing: 0.05em;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--green); }

  /* SECTIONS */
  section { padding: 100px 0 80px; }
  .container { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }

  /* SECTION HEADER */
  .sec-header {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--green);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .sec-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }
  .sec-title {
    font-family: var(--sans);
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 3rem;
    line-height: 1.2;
  }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center;
    position: relative;
    overflow: hidden;
    padding-top: 56px;
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.4;
    mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);
  }
  .hero-glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,255,65,0.08) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-prompt {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--green-dim);
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .hero-name {
    font-size: clamp(3rem, 7vw, 5.5rem);
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  .hero-name span { color: var(--green); }
  .hero-role {
    font-family: var(--mono);
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--text-dim);
    margin-bottom: 2rem;
    min-height: 1.6em;
  }
  .cursor {
    display: inline-block;
    width: 2px; height: 1.1em;
    background: var(--green);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .hero-desc {
    max-width: 520px;
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 2.5rem;
    line-height: 1.8;
  }
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 1.75rem;
    background: var(--green);
    color: #000;
    border: none; cursor: pointer;
    font-weight: 700;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-primary:hover { background: #fff; transform: translateY(-1px); }
  .btn-secondary {
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 1.75rem;
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--green-faint); }
  .hero-stats {
    position: absolute; right: 0; bottom: 15%;
    display: flex; flex-direction: column; gap: 1.5rem;
  }
  .hero-stat {
    text-align: right;
    border-right: 2px solid var(--green);
    padding-right: 1.25rem;
  }
  .hero-stat-num {
    font-family: var(--mono);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
  }
  .hero-stat-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* TERMINAL BLOCK */
  .terminal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    font-family: var(--mono);
    font-size: 0.85rem;
  }
  .terminal-bar {
    background: var(--bg3);
    padding: 0.6rem 1rem;
    display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .t-dot { width: 10px; height: 10px; border-radius: 50%; }
  .t-dot.r { background: #ff5f57; }
  .t-dot.y { background: #febc2e; }
  .t-dot.g { background: #28c840; }
  .t-title { font-size: 0.7rem; color: var(--text-muted); margin-left: auto; margin-right: auto; }
  .terminal-body { padding: 1.25rem 1.5rem; }
  .t-line { display: flex; gap: 0.5rem; margin-bottom: 0.35rem; }
  .t-prompt { color: var(--green); user-select: none; }
  .t-cmd { color: #e2e8f0; }
  .t-out { color: var(--text-dim); padding-left: 1rem; margin-bottom: 0.35rem; }
  .t-key { color: #7dd3fc; }
  .t-val { color: #86efac; }

  /* SKILLS */
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
  .skill-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 1.5rem;
    transition: border-color 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }
  .skill-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--green), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .skill-card:hover { border-color: rgba(0,255,65,0.3); transform: translateY(-3px); }
  .skill-card:hover::before { opacity: 1; }
  .skill-card-icon {
    font-family: var(--mono);
    font-size: 1.4rem;
    color: var(--green);
    margin-bottom: 0.75rem;
    line-height: 1;
  }
  .skill-card-title {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--green);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .skill-tag {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 0.25rem 0.6rem;
    background: var(--green-faint);
    border: 1px solid rgba(0,255,65,0.2);
    color: var(--text-dim);
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .skill-tag:hover { background: rgba(0,255,65,0.12); color: var(--green); }

  /* EXPERIENCE */
  .exp-list { display: flex; flex-direction: column; gap: 0; }
  .exp-item {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 0 2rem;
    position: relative;
    padding-bottom: 2.5rem;
  }
  .exp-item:last-child { padding-bottom: 0; }
  .exp-item::before {
    content: '';
    position: absolute;
    left: 160px; top: 8px; bottom: 0;
    width: 1px;
    background: var(--border);
    margin-left: -1px;
  }
  .exp-item::after {
    content: '';
    position: absolute;
    left: 160px; top: 8px;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-left: -4px;
    box-shadow: 0 0 8px var(--green);
  }
  .exp-date {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    padding-top: 0.1rem;
    text-align: right;
    padding-right: 2rem;
  }
  .exp-company {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--green-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .exp-role {
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
  .exp-bullets li {
    font-size: 0.9rem;
    color: var(--text-dim);
    padding-left: 1.2rem;
    position: relative;
    line-height: 1.6;
  }
  .exp-bullets li::before {
    content: '›';
    position: absolute; left: 0;
    color: var(--green);
    font-family: var(--mono);
  }

  /* FORMATIONS */
  .edu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
  .edu-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }
  .edu-card:hover { border-color: rgba(0,255,65,0.3); transform: translateY(-3px); }
  .edu-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 0.2rem 0.6rem;
    background: var(--green-faint);
    border: 1px solid rgba(0,255,65,0.3);
    color: var(--green);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .edu-name {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.35rem;
    line-height: 1.4;
  }
  .edu-school {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .edu-date {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--green-dim);
  }
  .cert-badge {
    position: absolute; top: 1rem; right: 1rem;
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 0.15rem 0.5rem;
    background: rgba(254,188,46,0.1);
    border: 1px solid rgba(254,188,46,0.3);
    color: #febc2e;
    letter-spacing: 0.1em;
  }

  /* PROJETS */
  .proj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
  .proj-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 1.75rem;
    transition: border-color 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }
  .proj-card:hover { border-color: rgba(0,255,65,0.3); transform: translateY(-3px); }
  .proj-num {
    font-family: var(--mono);
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--border);
    line-height: 1;
    margin-bottom: 1rem;
    transition: color 0.3s;
  }
  .proj-card:hover .proj-num { color: rgba(0,255,65,0.15); }
  .proj-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .proj-desc { font-size: 0.88rem; color: var(--text-dim); margin-bottom: 1.25rem; line-height: 1.7; }
  .proj-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .proj-tag {
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--border);
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* ABOUT */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
  .about-text { font-size: 1rem; color: var(--text-dim); line-height: 1.9; }
  .about-text p { margin-bottom: 1.25rem; }
  .about-sidebar { display: flex; flex-direction: column; gap: 1.25rem; }
  .about-item {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem;
    background: var(--bg2);
    border: 1px solid var(--border);
  }
  .about-item-icon {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--green);
    min-width: 20px;
    padding-top: 0.1rem;
  }
  .about-item-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }
  .about-item-value { font-size: 0.9rem; color: var(--text); }

  /* CONTACT */
  #contact { background: var(--bg); }
  .contact-wrapper {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start;
  }
  .contact-info { display: flex; flex-direction: column; gap: 1rem; }
  .contact-link {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    text-decoration: none;
    transition: border-color 0.3s, transform 0.2s;
    color: var(--text);
  }
  .contact-link:hover { border-color: rgba(0,255,65,0.4); transform: translateX(4px); }
  .contact-link-icon {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--green);
    min-width: 24px;
  }
  .contact-link-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.15rem;
  }
  .contact-link-val { font-size: 0.9rem; color: var(--text-dim); }
  .contact-form { display: flex; flex-direction: column; gap: 1rem; }
  .form-field { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-field label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .form-field input, .form-field textarea {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .form-field input:focus, .form-field textarea:focus { border-color: rgba(0,255,65,0.5); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 2rem;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  footer span { color: var(--green); }

  /* TWEAKS PANEL */
  .tweaks-panel {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    width: 280px;
    background: var(--bg3);
    border: 1px solid rgba(0,255,65,0.3);
    padding: 1.25rem;
    z-index: 9998;
    font-family: var(--mono);
    box-shadow: 0 0 30px rgba(0,255,65,0.1);
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-title {
    font-size: 0.7rem;
    color: var(--green);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.75rem;
  }
  .tweak-row { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  .tweak-label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .tweak-btns { display: flex; gap: 0.5rem; }
  .tweak-btn {
    flex: 1;
    padding: 0.4rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    text-align: center;
  }
  .tweak-btn.active { background: var(--green-faint); border-color: var(--green); color: var(--green); }
  .tweak-btn:hover:not(.active) { border-color: var(--text-muted); color: var(--text); }
  .tweak-color-row { display: flex; gap: 0.5rem; }
  .tweak-color {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tweak-color.active { border-color: #fff; }

  /* REVEAL ANIMATION */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  @media (max-width: 768px) {
    .about-grid, .contact-wrapper { grid-template-columns: 1fr; gap: 2rem; }
    .hero-stats { display: none; }
    .exp-item { grid-template-columns: 1fr; }
    .exp-item::before, .exp-item::after { display: none; }
    .exp-date { text-align: left; padding-right: 0; margin-bottom: 0.35rem; }
    nav .nav-links { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00BFFF",
  "density": "comfortable",
  "scanlines": true
}/*EDITMODE-END*/;

// Typewriter hook
function useTypewriter(strings, speed = 60, pause = 1800) {
  const [display, setDisplay] = useState('');
  const [idx, setIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const str = strings[idx % strings.length];
    const timeout = setTimeout(() => {
      if (!deleting) {
        setDisplay(str.slice(0, charIdx + 1));
        if (charIdx + 1 === str.length) {
          setTimeout(() => setDeleting(true), pause);
        } else {
          setCharIdx(c => c + 1);
        }
      } else {
        setDisplay(str.slice(0, charIdx - 1));
        if (charIdx - 1 === 0) {
          setDeleting(false);
          setIdx(i => i + 1);
          setCharIdx(0);
        } else {
          setCharIdx(c => c - 1);
        }
      }
    }, deleting ? speed / 2 : speed);
    return () => clearTimeout(timeout);
  }, [display, deleting, charIdx, idx]);

  return display;
}

// Intersection reveal
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

        </div>

}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  useReveal();

  const handleTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    const root = document.documentElement;
    if (key === 'accentColor') {
      root.style.setProperty('--green', val);
      root.style.setProperty('--green-dim', val + 'cc');
      root.style.setProperty('--green-glow', val + '26');
      root.style.setProperty('--green-faint', val + '10');
    }
    if (key === 'density') {
      const pad = val === 'compact' ? '60px' : val === 'spacious' ? '140px' : '100px';
      document.querySelectorAll('section').forEach(s => { s.style.paddingTop = pad; s.style.paddingBottom = (parseInt(pad)*0.8)+'px'; });
    }
    if (key === 'scanlines') {
      document.body.style.setProperty('--scanline-opacity', val ? '1' : '0');
      document.body.style.setProperty('display', val ? '' : '');
    }
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <>
      <Nav/>
      <Hero/>
      <About/>
      <Skills/>
      <Experience/>
      <Education/>
      <Projects/>
      <Contact/>
      <footer>
        <span>tudor@cyber:~$</span>
        <span>© 2026 Petre Tudor — Tous droits réservés</span>
        <span style={{color:'var(--text-muted)'}}>Lille, France</span>
      </footer>
      <TweaksPanel open={tweaksOpen} tweaks={tweaks} onChange={handleTweak}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
